buildscript {
    repositories {
        mavenLocal()
        mavenCentral()
        google()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath 'com.brightdata:bright-sdk-gradle:1.+'
    }
}

allprojects {
    repositories {
        mavenLocal()
        mavenCentral()
        google()
    }
}

apply plugin: 'com.android.library'
apply plugin: com.brightdata.BrightSdkPlugin

brightsdk {
    // default values kept for reference
    ext = 'brightsdk'
    version = 'latest'
    useLocalCache = true
    dir = 'libs'
}

android {
    namespace 'com.brightsdk.react'

    compileSdkVersion 35

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 35
    }

    lintOptions {
        abortOnError false
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
}

afterEvaluate {
    // Ensure the SDK is installed before build
    tasks.matching { it.name == 'preBuild' }.all {
        dependsOn 'installBrightSdk'
    }
}