buildscript {
    repositories {
        mavenCentral()
        google()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath 'com.brightdata:bright-sdk-gradle:1.+'
    }
}

allprojects {
    repositories {
        mavenCentral()
        google()
    }
}

apply plugin: 'com.android.library'

ext.brightsdk = [
    useMavenLocal: true,
    version: "latest",
    ext: "brightsdk",
]
apply plugin: 'com.brightdata.brightsdk-gradle'

android {
    namespace 'com.brightsdk.react'

    compileSdkVersion 35

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 35
    }

    lintOptions {
        abortOnError false
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
}

afterEvaluate {
    // Ensure the SDK is installed before build
    tasks.matching { it.name == 'preBuild' }.all {
        dependsOn 'installBrightSdk'
    }
}